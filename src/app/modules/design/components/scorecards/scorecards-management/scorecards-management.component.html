<div class="scorecards-management-container">
    <div class="management-header">
        <div class="header-content">
            <div class="header-title-section">
                <h1 class="page-title">
                    <i class="fas fa-chart-line"></i>
                    Scorecards Management
                </h1>
                <p class="page-subtitle">Create and manage performance scorecards</p>
            </div>

            <div class="header-actions">
                <div class="search-bar-wrapper">
                    <div class="search-input-group">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" [(ngModel)]="searchValue" (keydown.enter)="search()"
                            placeholder="Search scorecards...">
                        <button type="button" class="btn-search" (click)="search()" title="Search">
                            <i class="fas fa-arrow-right color-primary"></i>
                        </button>
                    </div>
                </div>

                <button type="button" class="btn btn-add-tag" (click)="add(AddUpdate_template)"
                    *ngxPermissionsOnly="['WORK_SPACE_ADMIN']">
                    <i class="fas fa-plus me-2"></i>Add Scorecard
                </button>
            </div>

        </div>
    </div>

    <!-- ============================================================================
         TABLE SECTION - Scorecards Data
         ============================================================================ -->
    <div class="table-section">
        <div class="table-wrapper">
            <table class="management-table" dir="ltr">
                <thead>
                    <tr class="table-header-row">
                        <!-- ID Column -->
                        <th width="15%">
                            <div class="header-cell-content">
                                <span class="header-content">
                                    <i class="fas fa-hashtag"></i>
                                    ID
                                </span>
                                <button class="sort-btn" (click)="sort('Id')" title="Sort by ID">
                                    <i class="fas fa-sort"></i>
                                </button>
                            </div>
                        </th>

                        <!-- Name Column -->
                        <th width="70%">
                            <div class="header-cell-content">
                                <span class="header-content">
                                    <i class="fas fa-caret-square-o-right"></i>
                                    Name
                                </span>
                                <button class="sort-btn" (click)="sort('Name')" title="Sort by Name">
                                    <i class="fas fa-sort"></i>
                                </button>
                            </div>
                        </th>

                        <!-- Actions Column -->
                        <th width="15%">
                            <span class="header-content">
                                <i class="fas fa-cogs"></i>
                                Actions
                            </span>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Empty State -->
                    <tr class="table-empty-row" *ngIf="!paginatedScorecards || paginatedScorecards.length === 0">
                        <td [attr.colspan]="3" class="empty-state">
                            <div class="empty-state-content">
                                <i class="fas fa-inbox"></i>
                                <p>No scorecards found</p>
                                <small>Try adjusting your search or create a new scorecard</small>
                            </div>
                        </td>
                    </tr>

                    <!-- Data Rows -->
                    <tr class="table-data-row" *ngFor="let scorecard of paginatedScorecards; let i = index"
                        [class.row-alternate]="i % 2 === 1">

                        <!-- ID -->
                        <td>
                            <span class="cell-badge cell-id">
                                <i class="fas fa-hashtag"></i>
                                {{scorecard.id}}
                            </span>
                        </td>

                        <!-- Name -->
                        <td>
                            <div class="cell-content">
                                <span class="cell-title">{{scorecard.name}}</span>
                            </div>
                        </td>

                        <td class="col-actions">
                            <div class="actions-menu">
                                <button type="button" class="action-btn edit-btn"
                                    (click)="update(scorecard, AddUpdate_template)" title="Edit scorecard">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn copy-btn" type="button"
                                    (click)="copy(scorecard, AddUpdate_template)">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <button type="button" class="action-btn delete-btn"
                                    (click)="delete(scorecard, deleteModal)" title="Delete scorecard">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination Section -->
    <div class="pagination-section">
        <div class="pagination-info">
            <span class="info-text">
                total: <strong>{{paginationResult.totalCount}}</strong> scorecards
            </span>
            <div class="page-size-selector">
                <label for="pageSize">Items per page:</label>
                <select id="pageSize" class="page-size-select" (change)="onLimitChange($event.target)"
                    [value]="paginationItem.pageSize">
                    <option *ngFor="let option of pageLimitOptions" [value]="option">
                        {{option}}
                    </option>
                </select>
            </div>
        </div>

        <nav class="pagination-nav">
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasPreviousPage"
                (click)="first()" title="First page">
                <i class="fas fa-angle-double-left"></i>
            </button>
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasPreviousPage"
                (click)="previous()" title="Previous page">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="page-numbers">
                <button type="button" class="page-number-btn" *ngFor="let page of pages()"
                    [class.active]="page === paginationItem.pageNumber" (click)="goToPage(page)">
                    {{page}}
                </button>
            </div>

            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasNextPage" (click)="next()"
                title="Next page">
                <i class="fas fa-chevron-right"></i>
            </button>
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasNextPage" (click)="last()"
                title="Last page">
                <i class="fas fa-angle-double-right"></i>
            </button>
        </nav>
    </div>
</div>

<!-- ============================================================================
     MODALS
     ============================================================================ -->

<!-- Add/Update Scorecard Modal -->
<ng-template #AddUpdate_template let-modal>
    <app-add-update-scorecard [modal]="addUpdateModal" (scorecardAddedEvent)="scorecardAddedEventHandler($event)"
        (scorecardUpdatedEvent)="scorecardUpdatedEventHandler($event)">
    </app-add-update-scorecard>
</ng-template>

<!-- Delete Confirmation Modal -->
<ng-template #deleteModal>
    <app-delete-modal [modal]="deleteModalReference" (deletedEvent)="scorecardDeletedEventHandler($event)">
    </app-delete-modal>
</ng-template>
