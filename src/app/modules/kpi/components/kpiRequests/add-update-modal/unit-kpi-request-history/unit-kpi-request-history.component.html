<div *ngIf="false; else light">
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="timeline-steps aos-init aos-animate" data-aos="fade-up">
                    <div *ngFor="let history of requestHistoryList; let i = index" class="timeline-step">
                        <div class="timeline-content" data-bs-toggle="popover" data-trigger="hover" data-placement="top">
                            <div class="inner-circle"></div>
                            <p class="h6">{{history.status?.value}}</p>
                            <p class="h6 mt-3 mb-0">{{history.actionBy}}</p>
                            <p class="text-muted mb-0 mb-lg-0" style="font-size: small;">{{history.createdAt | date:
                                'yyyy/MM/dd hh:mm'}}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #light>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <div class="hori-timeline" dir="ltr">
                            <ul class="list-inline events">
                                <li *ngFor="let history of requestHistoryList; let i = index"
                                    class="list-inline-item event-list">
                                    <div class="px-4">
                                        <div class="event-date bg-soft-primary font-size-18">{{history.createdAt | date:
                                            'yyyy-M-dd'}}</div>
                                        <h5 class="font-size-22" style="min-height: 80px;">{{history.message}}</h5>
                                        <p class="h6 mt-3 mb-0 midBlueColor font-size-18"> 
                                            <i class="fa fa-user-o" aria-hidden="true"></i>
                                            {{history.actionBy}}
                                        </p>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ng-template>
