<div id="data-model" class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{{actionType}} Data</h5>
    </div>
    <div id="dataDiv" class="modal-body content-body">
        <form [formGroup]="dataForm" (ngSubmit)="onSubmit()">

            <div class="row">
                <div class="col-lg-4">
                    <label for="name">Data name<span class="redStar">*</span></label>
                    <input type="text" class="form-control" formControlName="name" id="name"
                        placeholder="Enter data name"
                        [ngClass]="{ 'is-invalid': submitted && formFileds['name'].errors }"
                        [ngClass]="{ 'is-valid': submitted && !formFileds['name'].errors }">
                    <div class="validation-div text-danger">
                        <span *ngIf="(submitted && formFileds['name'].errors) && 
                                    (formFileds['name'].errors['required'])">
                            Value is Mandatory
                        </span>
                        <span *ngIf="(submitted && formFileds['name'].errors) && 
                        (formFileds['name'].errors['maxlength'])">
                            Maximum allowed characters is 100
                        </span>
                    </div>
                </div>

                <div class="col-lg-4">
                    <label for="calculationGuide">Calculation Guide<span class="redStar">*</span></label>
                    <input type="text" class="form-control" formControlName="calculationGuide" id="name"
                        placeholder="Enter data calculation Guide"
                        [ngClass]="{ 'is-invalid': submitted && formFileds['calculationGuide'].errors }"
                        [ngClass]="{ 'is-valid': submitted && !formFileds['calculationGuide'].errors }">
                    <div class="validation-div text-danger">
                        <span *ngIf="(submitted && formFileds['calculationGuide'].errors) && 
                                    (formFileds['calculationGuide'].errors['required'])">
                            Value is Mandatory
                        </span>
                        <span *ngIf="(submitted && formFileds['calculationGuide'].errors) && 
                        (formFileds['calculationGuide'].errors['maxlength'])">
                            Maximum allowed characters is 100
                        </span>
                    </div>
                </div>

                <div class="col-lg-4">
                    <label for="measurmentUnit">Objective measurment unit</label>
                    <select formControlName="measurmentUnit" class="form-select form-control" id="measurmentUnit"
                        [ngClass]="{ 'is-invalid': submitted && formFileds['measurmentUnit'].errors }"
                        [ngClass]="{ 'is-valid': submitted && !formFileds['measurmentUnit'].errors }">
                        <option disabled hidden value="0">Select Measurment Unit</option>
                        <option *ngFor="let unit of measurmentUnits" value="{{unit.id}}">{{unit.value}}</option>
                    </select>
                    <div class="validation-div text-danger">
                        <span *ngIf="(submitted && formFileds['measurmentUnit'].errors) && 
                                    (formFileds['measurmentUnit'].errors['min'])">
                            Value is Mandatory
                        </span>
                    </div>
                </div>

            </div>

            <div class="modal-footer justify-content-between">
                <button type="button" (click)="close()" class="btn btn-outline-danger" data-dismiss="modal">Close</button>
                <button type="submit" class="btn btn-primary">Save changes</button>
            </div>
        </form>
    </div>
</div>
