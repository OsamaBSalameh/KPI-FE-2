<div id="auditTrail-model" class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">View Element History</h5>
    </div>
    <div id="auditTrailDiv" class="modal-body content-body">
        <form [formGroup]="auditTrailForm">

            <div class="row">
                <div class="col-lg-6">
                    <label for="actionName">Action Name</label>
                    <input type="text" class="form-control" formControlName="actionName" id="actionName">
                </div>

                <div class="col-lg-6">
                    <label for="type">Type</label>
                    <input type="text" class="form-control" formControlName="type" id="type">
                </div>
            </div>

            <div class="row">
                <div class="col-lg-6">
                    <label for="actionBy">Action By</label>
                    <input type="text" class="form-control" formControlName="actionBy" id="actionBy">
                </div>

                <div class="col-lg-6">
                    <label for="tableName">Table Name</label>
                    <input type="text" class="form-control" formControlName="tableName" id="tableName">
                </div>
            </div>

            <div class="row">
                <div class="col-lg-12">
                    <label for="oldValues">Old Values</label>
                    <pre> {{auditTrailForm.value.oldValues|json}} </pre>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-12">
                    <label for="newValues">New Values</label>
                    <pre> {{auditTrailForm.value.newValues|json}} </pre>
                </div>
            </div>

            <div class="modal-footer justify-content-between">
                <button type="button" (click)="close()" class="btn btn-outline-danger"
                    auditTrail-dismiss="modal">Close</button>
            </div>
        </form>
    </div>

</div>
