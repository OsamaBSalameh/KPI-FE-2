<div id="work-space-model" class="modern-kpi-modal">
    <div class="modal-header">
        <div class="header-content">
            <div class="icon-wrapper">
                <i class="fas fa-briefcase"></i>
            </div>
            <div class="title-section">
                <h5 class="modal-title">{{actionType}} work space</h5>
                <p class="modal-subtitle">Manage work space for each department</p>
            </div>
        </div>
        <button type="button" class="btn-close" (click)="close()" aria-label="Close">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div id="workSpaceDiv" class="modal-body content-body">
        <form [formGroup]="workSpaceForm" (ngSubmit)="onSubmit()">

            <div class="form-card mb-4">
                <div class="card-header-custom">
                    <i class="fas fa-info-circle"></i>
                    <span>Work space Information</span>
                </div>
                <div class="card-body-custom">
                    <div class="row g-3">

                        <div class="col-lg-4">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <i class="fas fa-caret-square-o-right input-icon"></i>
                                    <label for="name" class="form-label">Name<span class="redStar">*</span></label>
                                    <input type="text" class="form-control height-100per modern-input"
                                        formControlName="name" id="name" placeholder="Enter work space name"
                                        [ngClass]="{ 'is-invalid': submitted && formFileds['name'].errors, 'is-valid': submitted && !formFileds['name'].errors }">
                                </div>
                                <div class="validation-messages" *ngIf="submitted && formFileds['name'].errors">
                                    <small *ngIf="formFileds['name'].errors['required']" class="text-danger">
                                        <i class="fas fa-exclamation-circle"></i> Work space name is required
                                    </small>
                                    <small *ngIf="formFileds['name'].errors['maxlength']" class="text-danger">
                                        <i class="fas fa-exclamation-circle"></i> Maximum 100 characters allowed
                                    </small>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-lg-4">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <i class="fas fa-caret-square-o-right input-icon"></i>
                                    <label for="logo_Name" class="form-label">Logo name</label>
                                    <input type="text" class="form-control height-100per modern-input"
                                        formControlName="logo_Name" id="logo_Name" placeholder="Enter logo name"
                                        [ngClass]="{ 'is-invalid': submitted && formFileds['logo_Name'].errors, 'is-valid': submitted && !formFileds['logo_Name'].errors }">
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <i class="fas fa-hashtag input-icon"></i>
                                    <label for="logo_Description" class="form-label">Logo Description</label>
                                    <input type="text" class="form-control height-100per modern-input"
                                        formControlName="logo_Description" id="logo_Description"
                                        placeholder="Enter logog description, (MEasurement, Monitor, Comply)"
                                        [ngClass]="{ 'is-invalid': submitted && formFileds['logo_Description'].errors, 'is-valid': submitted && !formFileds['logo_Description'].errors }">
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <i class="fas fa-file-code-o input-icon"></i>
                                    <label for="logo_SVG" class="form-label">
                                        Logo SVG Value
                                    </label>
                                    <textarea formControlName="logo_SVG" placeholder="svg data.."
                                        class="form-control modern-textarea" rows="3" [ngClass]="{ 
                                            'is-invalid': submitted && formFileds['logo_SVG'].errors, 
                                            'is-valid': submitted && !formFileds['logo_SVG'].errors 
                                        }"></textarea>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="form-card mt-4">
                <div class="card-header-custom">
                    <i class="fas fa-users"></i>
                    <span>Work Space Admin List</span>
                </div>

                <div class="card-body-custom">

                    <div class="row g-3">

                        <div class="col-4">
                            <div class="input-wrapper">
                                <i class="fas fa-briefcase input-icon"></i>
                                <label for="departmentId" class="form-label">Department<span
                                        class="text-danger">*</span></label>
                                <select formControlName="departmentId" id="departmentId"
                                    class="form-select modern-select" (change)="departmentChange()"
                                    [ngClass]="{ 'is-invalid': submitted && formFileds['departmentId'].errors }">
                                    <option disabled hidden value="0">Select Unit</option>
                                    <option *ngFor="let unit of allUnits" [value]="unit.id">{{unit.name}}
                                    </option>
                                </select>
                            </div>
                            <div class="invalid-feedback" *ngIf="submitted && formFileds['departmentId'].errors">
                                Please select a department
                            </div>
                        </div>

                        <div class="col-8">
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <i class="fas fa-user-plus input-icon"></i>
                                    <label for="selectedUsers" class="form-label">Users</label>
                                    <ng-multiselect-dropdown [settings]="dropdownSettings"
                                        [data]="selectedDepartmentUsers" formControlName="selectedUsers"
                                        [placeholder]="'Select Department Users'" (onSelect)="onUserSelect($event)"
                                        (onDeSelect)="onDeSelectUser($event)" (onDeSelectAll)="onDeSelectAll()"
                                        (onSelectAll)="onSelectAllUsers($event)" class="modern-dropdown" [ngClass]="{ 
                                                                    'is-invalid': submitted && formFileds['selectedUsers'].errors, 
                                                                    'is-valid': submitted && !formFileds['selectedUsers'].errors 
                                                                }">
                                    </ng-multiselect-dropdown>
                                    <div class="validation-div text-danger">
                                        <span *ngIf="(submitted && formFileds['selectedUsers'].errors) && 
                                                            (formFileds['selectedUsers'].errors['required'])">
                                            Value is Mandatory
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="modal-footer-custom justify-content-between">
                <button type="button" (click)="close()" class="btn btn-outline-danger">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button type="submit" [disabled]="view" class="btn btn-primary modern-btn btn-save"
                    *ngxPermissionsOnly="['SUPER_ADMIN']">
                    <i class="fas fa-save"></i> Save changes
                </button>
            </div>

        </form>
    </div>
</div>
