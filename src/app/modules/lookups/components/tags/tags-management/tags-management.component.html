<div class="tags-management-container">
    <!-- Header Section -->
    <div class="management-header">
        <div class="header-content">
            <div class="header-title-section">
                <h1 class="page-title">
                    <i class="fas fa-tags me-3"></i>Tags Management
                </h1>
                <p class="page-subtitle">Create and organize system tags for better categorization</p>
            </div>

            <div class="header-actions">
                <div class="search-bar-wrapper">
                    <div class="search-input-group">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" [(ngModel)]="searchValue" (keydown.enter)="search()"
                            placeholder="Search tags by name...">
                        <button type="button" class="btn-search" (click)="search()" title="Search">
                            <i class="fas fa-arrow-right color-primary"></i>
                        </button>
                    </div>
                </div>

                <button type="button" class="btn btn-add-tag" (click)="add(AddUpdate_template)"
                    *ngxPermissionsOnly="['SUPER_ADMIN']">
                    <i class="fas fa-plus me-2"></i>Add Tag
                </button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-section">
        <div class="table-wrapper">
            <table class="tags-table">
                <thead>
                    <tr>
                        <th class="col-id">
                            <div class="header-cell">
                                <span>ID</span>
                                <button class="sort-btn" (click)="sort('Id')" title="Sort by ID">
                                    <i class="fas fa-arrows-alt-v"></i>
                                </button>
                            </div>
                        </th>
                        <th class="col-tag-name">
                            <div class="header-cell">
                                <span>Tag Name</span>
                                <button class="sort-btn" (click)="sort('Name')" title="Sort by Name">
                                    <i class="fas fa-arrows-alt-v"></i>
                                </button>
                            </div>
                        </th>
                        <th class="col-actions">
                            <div class="header-cell">
                                <span>Actions</span>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="table-data-row" *ngFor="let tag of paginatedTags; let i = index" [class.row-alternate]="i % 2 === 1">
                        <td class="col-id">
                            <span class="id-badge">{{tag.id}}</span>
                        </td>
                        <td class="col-tag-name">
                            <div class="tag-name-cell">
                                <i class="fas fa-tag tag-icon"></i>
                                <span class="tag-name-text">{{tag.name}}</span>
                            </div>
                        </td>
                        <td class="col-actions">
                            <div class="actions-menu">
                                <button type="button" class="action-btn edit-btn"
                                    (click)="update(tag, AddUpdate_template)" title="Edit tag">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button type="button" class="action-btn delete-btn" (click)="delete(tag, deleteModal)"
                                    title="Delete tag">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div class="empty-state" *ngIf="paginatedTags.length === 0">
            <div class="empty-state-content">
                <i class="fas fa-inbox"></i>
                <h3>No tags found</h3>
                <p>Create your first tag to get started</p>
                <button type="button" class="btn-add-tag mt-3" (click)="add(AddUpdate_template)"
                    *ngxPermissionsOnly="['SUPER_ADMIN']">
                    <i class="fas fa-plus me-2"></i>Create First Tag
                </button>
            </div>
        </div>
    </div>

    <!-- Pagination Section -->
    <div class="pagination-section">
        <div class="pagination-info">
            <span class="info-text">
                total: <strong>{{paginationResult.totalCount}}</strong> tags
            </span>
            <div class="page-size-selector">
                <label for="pageSize">Items per page:</label>
                <select id="pageSize" class="page-size-select" (change)="onLimitChange($event.target)"
                    [value]="paginationItem.pageSize">
                    <option *ngFor="let option of pageLimitOptions" [value]="option">
                        {{option}}
                    </option>
                </select>
            </div>
        </div>

        <nav class="pagination-nav">
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasPreviousPage"
                (click)="first()" title="First page">
                <i class="fas fa-angle-double-left"></i>
            </button>
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasPreviousPage"
                (click)="previous()" title="Previous page">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="page-numbers">
                <button type="button" class="page-number-btn" *ngFor="let page of pages()"
                    [class.active]="page === paginationItem.pageNumber" (click)="goToPage(page)">
                    {{page}}
                </button>
            </div>

            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasNextPage" (click)="next()"
                title="Next page">
                <i class="fas fa-chevron-right"></i>
            </button>
            <button type="button" class="pagination-btn" [disabled]="!paginationResult.hasNextPage" (click)="last()"
                title="Last page">
                <i class="fas fa-angle-double-right"></i>
            </button>
        </nav>
    </div>
</div>

<!-- Modals -->
<ng-template #AddUpdate_template let-modal>
    <app-add-update-tag [modal]="addUpdateModal" (tagAddedEvent)="tagAddedEventHandler($event)"
        (tagUpdatedEvent)="tagUpdatedEventHandler($event)">
    </app-add-update-tag>
</ng-template>

<ng-template #deleteModal>
    <app-delete-modal [modal]="deleteModalReference" (deletedEvent)="tagDeletedEventHandler($event)">
    </app-delete-modal>
</ng-template>
