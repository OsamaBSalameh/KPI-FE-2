<form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()" class="form-horizontal">
    <div class="form-group row">
        <label for="currentPassword" class="col-sm-2 col-form-label">Current Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="currentPassword" placeholder="Current password"
                formControlName="currentPassword"
                [ngClass]="{ 'is-invalid': submitted && formFileds['currentPassword'].errors }"
                [ngClass]="{ 'is-valid': submitted && !formFileds['currentPassword'].errors }">
            <div class="validation-div text-danger">
                <span *ngIf="(submitted && formFileds['currentPassword'].errors) && 
                                    (formFileds['currentPassword'].errors['required'])">
                    Value is Mandatory
                </span>
            </div>
        </div>
    </div>
    <div class="form-group row">
        <label for="newPassword" class="col-sm-2 col-form-label">New Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="newPassword" placeholder="New password"
                formControlName="newPassword"
                [ngClass]="{ 'is-invalid': submitted && formFileds['newPassword'].errors }"
                [ngClass]="{ 'is-valid': submitted && !formFileds['newPassword'].errors }">
            <div class="validation-div text-danger">
                <span *ngIf="(submitted && formFileds['newPassword'].errors) && 
                                    (formFileds['newPassword'].errors['required'])">
                    Value is Mandatory
                </span>
            </div>
        </div>
    </div>
    <div class="form-group row">
        <label for="passwordConfirm" class="col-sm-2 col-form-label">Repeat Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirm your new password"
                formControlName="passwordConfirm"
                [ngClass]="{ 'is-invalid': submitted && formFileds['passwordConfirm'].errors }"
                [ngClass]="{ 'is-valid': submitted && !formFileds['passwordConfirm'].errors }">
            <div class="validation-div text-danger">
                <span *ngIf="(submitted && formFileds['passwordConfirm'].errors) && 
                                (formFileds['passwordConfirm'].errors['required'])">
                    Value is Mandatory
                </span>
                <span *ngIf="(submitted && formFileds['passwordConfirm'].errors) && 
                    (formFileds['passwordConfirm'].errors['matching'])">
                    Confirm Password does not match
                </span>
            </div>
        </div>
    </div>

    <div class="validation-div text-danger">
        <span *ngIf="(submitted && formFileds['passwordConfirm'].errors) && 
    (formFileds['passwordConfirm'].errors['pattern'])">
            The password should contain: (uppercase character, lowercase character, a number, and a
            special character.)
        </span>
    </div>


    <div class="form-group justify-content-between profile-footer">
        <hr style="width: 96%;">
        <button type="submit" class="btn btn btn-outline-primary">Save changes</button>
    </div>
</form>
