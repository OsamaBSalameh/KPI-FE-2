                <!-- <div class="illustration"><i class="icon ion-ios-locked-outline"></i></div> -->

                <div class="form-group">

                    <div class="input-icons">
                        <i class="fa fa-envelope icon" style="color: #B3B5B6;"></i>

                        <input class="login-control input-field" type="email" name="email" formControlName="email" id="email"
                        placeholder="Email" autocomplete="off" autocorrect="off" autocapitalize="none"
                        spellcheck="false" [ngClass]="{ 'is-invalid': submitted && formFileds['email'].errors }"
                        [ngClass]="{ 'is-valid': submitted && !formFileds['email'].errors }">
                    <div class="validation-div text-danger">
                        <span *ngIf="(submitted && formFileds['email'].errors) && 
                                        (formFileds['email'].errors['required'])">
                            Value is Mandatory
                        </span>
                    </div>
                    </div>

                </div>
                <div class="form-group"><button type="submit" class="btn btn-primary btn-block">Reset Password</button></div>
                <a class="forgot" href="/login">Back to login page</a>
