                <div class="form-group">
                    <div class="input-icons">
                        <i class="fa fa-user icon" style="color: #B3B5B6;"></i>

                        <input class="login-control input-field" type="userName" name="userName"
                            formControlName="userName" id="userName" placeholder="Username" autocomplete="off"
                            autocorrect="off" autocapitalize="none" spellcheck="false"
                            [ngClass]="{ 'is-invalid': submitted && formFileds['userName'].errors }"
                            [ngClass]="{ 'is-valid': submitted && !formFileds['userName'].errors }">

                        <div class="validation-div text-danger">
                            <span *ngIf="(submitted && formFileds['userName'].errors) && 
                                                            (formFileds['userName'].errors['required'])">
                                Value is Mandatory
                            </span>
                        </div>
                    </div>

                </div>
                <div class="form-group">
                    <div class="input-icons">
                        <i class="fa fa-key icon" style="color: #B3B5B6;"></i>
                        <input class="login-control input-field" type="password" name="password"
                            formControlName="password" id="password" placeholder="Password"
                            [ngClass]="{ 'is-invalid': submitted && formFileds['password'].errors }"
                            [ngClass]="{ 'is-valid': submitted && !formFileds['password'].errors }">
                        <div class="validation-div text-danger">
                            <span *ngIf="(submitted && formFileds['password'].errors) && 
                                                            (formFileds['password'].errors['required'])">
                                Value is Mandatory
                            </span>
                        </div>
                    </div>
                </div>

                        </span>
                    </div>
                </div> -->

                <div class="form-group"><button type="submit" class="btn btn-primary btn-block">Login</button></div>
                <!-- <a class="forgot" style="text-align: right;" href="/resetPassword">Forgot password?</a> -->
            </form>
