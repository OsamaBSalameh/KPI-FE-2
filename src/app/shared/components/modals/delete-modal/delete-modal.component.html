<div class="modern-delete-modal">
    <div class="modal-content delete-modal-content">
        <!-- Icon Section -->
        <div class="delete-icon-section">
            <div class="icon-container">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
        </div>

        <!-- Content Section -->
        <div class="modal-body delete-modal-body">
            <h2 class="delete-title">Delete</h2>
            <p class="delete-subtitle">This action cannot be undone</p>
            
            <div class="delete-warning-box">
                <i class="fas fa-info-circle"></i>
                <span>{{modal?.message || 'Are you sure you want to delete this item?'}}</span>
            </div>

            <p class="delete-confirmation-text">
                Once deleted, this data will be permanently removed from the system.
            </p>
        </div>

        <!-- Footer Section -->
        <div class="modal-footer delete-modal-footer">
            <button type="button" 
                class="btn btn-secondary" 
                (click)="cancel()"
                data-dismiss="modal">
                <i class="fas fa-times me-2"></i>Cancel
            </button>
            <button type="button" 
                class="btn btn-danger" 
                (click)="delete()">
                <i class="fas fa-trash-alt me-2"></i>Delete
            </button>
        </div>
    </div>
</div>
